<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#673de6">
        <title>Connexion indisponible</title>
        <style>
            * { box-sizing: border-box; }
            body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f4f5f7; color: #0f172a; font-family: Inter, system-ui, sans-serif; }
            main { width: min(100%, 430px); padding: 32px; text-align: center; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 2px 8px rgba(15, 23, 42, .06); }
            .logo { width: 52px; height: 52px; margin: 0 auto 20px; display: grid; place-items: center; border-radius: 8px; background: #673de6; color: #fff; font-weight: 800; }
            h1 { margin: 0; font-size: 24px; }
            p { margin: 12px 0 24px; color: #64748b; line-height: 1.6; }
            button { min-height: 44px; border: 0; border-radius: 6px; padding: 10px 18px; color: #fff; background: #673de6; font: inherit; font-weight: 700; cursor: pointer; }
        </style>
    </head>
    <body>
        <main>
            <div class="logo">DC</div>
            <h1>Connexion indisponible</h1>
            <p>L’application ne peut pas joindre le serveur. Vérifiez votre connexion internet, puis réessayez.</p>
            <button type="button" onclick="window.location.reload()">Réessayer</button>
        </main>
    </body>
</html>
